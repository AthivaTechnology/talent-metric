apiVersion: v1
kind: Namespace
metadata:
  name: talent-metric-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: talent-metric-sa
  namespace: talent-metric-dev
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam:::role/talent-metric-dev-role
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: talent-metric-config
  namespace: talent-metric-dev
data:
  NODE_ENV: "production"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "talent_metric"
  DB_USER: "talent_user"
  JWT_EXPIRE: "7d"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: talent-metric-secrets
  namespace: talent-metric-dev
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "talent-metric/dev/secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: "JWT_SECRET"
            objectAlias: "JWT_SECRET"
  secretObjects:
    - secretName: talent-metric-app-secrets
      type: Opaque
      data:
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: JWT_SECRET
          key: JWT_SECRET
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-policy
  namespace: talent-metric-dev
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: backend
    ports:
    - protocol: TCP
      port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: talent-metric-dev
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: talent-metric-dev
spec:
  ports:
  - port: 3306
  selector:
    app: mysql
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: talent-metric-dev
spec:
  serviceName: "mysql"
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: mysql
        image: mysql:8.0
        securityContext:
          runAsUser: 999
          allowPrivilegeEscalation: false
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: talent-metric-app-secrets
              key: DB_PASSWORD
        - name: MYSQL_DATABASE
          value: "talent_metric"
        - name: MYSQL_USER
          value: "talent_user"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: talent-metric-app-secrets
              key: DB_PASSWORD
        ports:
        - containerPort: 3306
          name: mysql
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: talent-metric-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: talent-metric-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: 382625484581.dkr.ecr.us-east-1.amazonaws.com/talent-metric-backend:6845400157d93c0c155e68921eeb0036470517e9
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false # Node apps usually need some write access, but keep it high level
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: talent-metric-config
        - secretRef:
            name: talent-metric-app-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/health # Assuming a health check endpoint exists
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "talent-metric-secrets"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: talent-metric-dev
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: talent-metric-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # Nginx user
      containers:
      - name: frontend
        image: 382625484581.dkr.ecr.us-east-1.amazonaws.com/talent-metric-frontend:6845400157d93c0c155e68921eeb0036470517e9
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: talent-metric-dev
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: talent-metric-ingress
  namespace: talent-metric-dev
  annotations:
    alb.ingress.kubernetes.io/group.name: k8s-sharedalb-85062740fc
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
spec:
  ingressClassName: alb
  rules:
  - host: dev.talent-metric.athivaone.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: talent-metric-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: talent-metric-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
