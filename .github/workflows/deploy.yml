name: Talent Metric CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 382625484581
  IAM_ROLE_NAME: Github-acition-oicd            
  BACKEND_REPOSITORY: talent-metric-backend
  FRONTEND_REPOSITORY: talent-metric-frontend

jobs:
  build:
    name: "🐳 Build & Push to ECR"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.IAM_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (git SHA)
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy_dev:
    name: " Deploy → talent-metric-dev"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: dev

      - name: Update image tags in dev manifest
        env:
          REGISTRY: ${{ needs.build.outputs.ecr_registry }}
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          sed -i "s|image: .*${{ env.BACKEND_REPOSITORY }}.*|image: $REGISTRY/${{ env.BACKEND_REPOSITORY }}:$TAG|g" k8s/dev-setup.yaml
          sed -i "s|image: .*${{ env.FRONTEND_REPOSITORY }}.*|image: $REGISTRY/${{ env.FRONTEND_REPOSITORY }}:$TAG|g" k8s/dev-setup.yaml
          # Replace general placeholders
          sed -i "s/<YOUR_ACCOUNT_ID>/${{ secrets.AWS_ACCOUNT_ID }}/g" k8s/dev-setup.yaml
          sed -i "s/<YOUR_REGION>/${{ env.AWS_REGION }}/g" k8s/dev-setup.yaml

      - name: Commit & push updated manifest
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          git config user.name "talent-metric-ci-bot"
          git config user.email "ci@talent-metric.com"
          git add k8s/dev-setup.yaml
          git diff --staged --quiet && echo "No manifest changes, skipping commit" && exit 0
          git commit -m "ci(dev): update images to ${TAG:0:7} [skip ci]"
          git push origin dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.IAM_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig & Deploy
        run: |
          aws eks update-kubeconfig --name talent-metric-cluster --region ${{ env.AWS_REGION }}
          kubectl apply -f k8s/dev-setup.yaml

  deploy_prod:
    name: "Deploy → talent-metric-prod [approval required]"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production               
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tags in prod manifest
        env:
          REGISTRY: ${{ needs.build.outputs.ecr_registry }}
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          sed -i "s|image: .*${{ env.BACKEND_REPOSITORY }}.*|image: $REGISTRY/${{ env.BACKEND_REPOSITORY }}:$TAG|g" k8s/prod-setup.yaml
          sed -i "s|image: .*${{ env.FRONTEND_REPOSITORY }}.*|image: $REGISTRY/${{ env.FRONTEND_REPOSITORY }}:$TAG|g" k8s/prod-setup.yaml
          # Replace general placeholders
          sed -i "s/<YOUR_ACCOUNT_ID>/${{ secrets.AWS_ACCOUNT_ID }}/g" k8s/prod-setup.yaml
          sed -i "s/<YOUR_REGION>/${{ env.AWS_REGION }}/g" k8s/prod-setup.yaml

      - name: Commit & push updated manifest
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          git config user.name "talent-metric-ci-bot"
          git config user.email "ci@talent-metric.com"
          git add k8s/prod-setup.yaml
          git diff --staged --quiet && echo "No manifest changes, skipping commit" && exit 0
          git commit -m "ci(prod): update images to ${TAG:0:7} [skip ci]"
          git push origin main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.IAM_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig & Deploy
        run: |
          aws eks update-kubeconfig --name talent-metric-cluster --region ${{ env.AWS_REGION }}
          kubectl apply -f k8s/prod-setup.yaml
